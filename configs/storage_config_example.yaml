# 云端存储配置示例
# Cloud Storage Configuration Example

# Google Spreadsheet配置
spreadsheet_id: "your_spreadsheet_id_here"
sheet_name: "总表"

# 云端存储bucket路径配置
# 这些路径将用于GCP Storage bucket中的文件组织
storage:
  # 模板文件路径（JSON配置文件）
  templates_path: "templates/"
  
  # ICS日历文件路径
  calendars_path: "calendars/"
  
  # 数据缓存路径
  data_cache_path: "data/cache/"
  
  # 备份文件路径
  backups_path: "backups/"
  
  # 日志文件路径
  logs_path: "logs/"

# 环境变量配置（可选）
# 这些配置也可以通过环境变量设置
environment:
  # GCP项目ID
  GOOGLE_CLOUD_PROJECT: "your-project-id"
  
  # GCP Storage Bucket名称
  GCP_STORAGE_BUCKET: "your-bucket-name"
  
  # 存储模式（cloud/local）
  STORAGE_MODE: "cloud"

# 使用说明：
# 1. 复制此文件为 config.yaml
# 2. 修改相应的配置值
# 3. 确保GCP认证已正确配置
# 4. ICS查看器将自动使用这些路径设置
