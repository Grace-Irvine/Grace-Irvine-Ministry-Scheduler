# Cloud Run服务配置 - 支持静态文件服务
# Cloud Run Service Configuration - Static File Service Support

apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: grace-irvine-scheduler
  annotations:
    run.googleapis.com/ingress: all
    run.googleapis.com/cpu-throttling: "false"
spec:
  template:
    metadata:
      annotations:
        # 自动扩缩容配置
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "10"
        
        # 资源配置
        run.googleapis.com/memory: "1Gi"
        run.googleapis.com/cpu: "1000m"
        
        # 执行环境
        run.googleapis.com/execution-environment: gen2
    spec:
      containerConcurrency: 80
      timeoutSeconds: 3600
      containers:
      - image: gcr.io/PROJECT_ID/grace-irvine-scheduler
        ports:
        - name: http1
          containerPort: 8080
        env:
        # Google Sheets配置
        - name: GOOGLE_SPREADSHEET_ID
          valueFrom:
            secretKeyRef:
              name: grace-irvine-secrets
              key: GOOGLE_SPREADSHEET_ID
        
        # 服务账户配置
        - name: GOOGLE_APPLICATION_CREDENTIALS
          value: "/app/configs/service_account.json"
        
        # Streamlit配置
        - name: STREAMLIT_SERVER_PORT
          value: "8080"
        - name: STREAMLIT_SERVER_ADDRESS
          value: "0.0.0.0"
        - name: STREAMLIT_SERVER_HEADLESS
          value: "true"
        - name: STREAMLIT_SERVER_ENABLE_CORS
          value: "false"
        - name: STREAMLIT_SERVER_ENABLE_XSRF_PROTECTION
          value: "false"
        
        resources:
          limits:
            memory: "1Gi"
            cpu: "1000m"
          requests:
            memory: "512Mi"
            cpu: "250m"
        
        # 健康检查
        livenessProbe:
          httpGet:
            path: /_stcore/health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 10
        
        readinessProbe:
          httpGet:
            path: /_stcore/health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
  traffic:
  - percent: 100
    latestRevision: true
